name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish
        run: |
          dotnet publish "Simpler.Host/Simpler.Host.csproj" -c Release -r win-x64 -p:PublishSingleFile=true -p:SelfContained=false

      - name: Prepare release folder
        shell: pwsh
        run: |
          $stage = "release";
          if (Test-Path $stage) { Remove-Item -Recurse -Force $stage }
          New-Item -ItemType Directory -Path $stage | Out-Null
          $publish = "Simpler.Host/bin/Release/net8.0-windows/win-x64/publish";
          Copy-Item -Force "$publish/Simpler.Host.exe" "$stage/Simpler.exe"
          Copy-Item -Force "README.md" "$stage/README.md"
          Copy-Item -Recurse -Force "scripts" "$stage/scripts"
          if (Test-Path "scripts/README.md") { Copy-Item -Force "scripts/README.md" "$stage/scripts/README.md" }
          Compress-Archive -Path "$stage/*" -DestinationPath "Simpler-windows.zip" -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Simpler-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
