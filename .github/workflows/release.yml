name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r simpler/requirements.txt pyinstaller

      - name: Build exe
        run: |
          python -m PyInstaller --clean --noconsole --onefile --name Simpler --collect-all encodings --hidden-import webbrowser --runtime-hook simpler/pyinstaller/runtime_hook.py simpler/main.py

      - name: Prepare release folder
        shell: pwsh
        run: |
          $stage = "release";
          if (Test-Path $stage) { Remove-Item -Recurse -Force $stage }
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item -Force "dist\Simpler.exe" "$stage\Simpler.exe"
          Copy-Item -Force "simpler\config.json" "$stage\config.json"
          Copy-Item -Recurse -Force "simpler\scripts" "$stage\scripts"
          Copy-Item -Force "simpler\README.md" "$stage\README.md"
          Compress-Archive -Path "$stage\*" -DestinationPath "Simpler-windows.zip" -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Simpler-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
