name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Publish
        run: |
          dotnet publish "Simpler.Host/Simpler.Host.csproj" -c Release -r win-x64 -p:PublishSingleFile=true -p:SelfContained=false

      - name: Prepare release folder
        shell: pwsh
        run: |
          $stage = "release"
          if (Test-Path $stage) { Remove-Item -Recurse -Force $stage }
          New-Item -ItemType Directory -Path $stage | Out-Null
          $publish = "Simpler.Host/bin/Release/net8.0-windows/win-x64/publish"
          Copy-Item -Force "$publish/Simpler.Host.exe" "$stage/Simpler.exe"
          Copy-Item -Force "$publish/Simpler.Core.dll" "$stage/Simpler.Core.dll"
          Copy-Item -Force "README.md" "$stage/README.md"
          New-Item -ItemType Directory -Path "$stage/scripts" | Out-Null
          if (Test-Path "scripts/README.md") { Copy-Item -Force "scripts/README.md" "$stage/scripts/README.md" }
          Compress-Archive -Path "$stage/*" -DestinationPath "Simpler-windows.zip" -Force

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $title = $tag

          gh release view $tag --repo "${{ github.repository }}" *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag "Simpler-windows.zip" --clobber --repo "${{ github.repository }}"
          }
          else {
            gh release create $tag "Simpler-windows.zip" --title $title --generate-notes --repo "${{ github.repository }}"
          }


